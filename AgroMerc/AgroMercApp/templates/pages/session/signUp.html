{% extends "pages/base.html" %}
{% load i18n %}

{% block nav_links %}
<a class="nav-link btn btn-outline-dark text-light" href="{% url 'AgroMerc' %}">{% trans "AgroMerc" %}</a>
<a class="nav-link btn btn-outline-dark text-light" href="{% url 'signIn' %}">{% trans "Iniciar Sesión" %}</a>
{% endblock nav_links %}

{% block content %}
<div class="container">
    <h2>{% trans "Registro" %}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">{% trans "Registrarse" %}</button>
    </form>
</div>
{% endblock %}
