{% extends "pages/base.html" %}
{% load i18n %}

{% block nav %}
{% endblock %}

{% block authenticated_links %}
<a class="nav-link btn btn-outline-dark text-light" href="{% url 'home' %}">{% trans "Inicio" %}</a>
{% endblock  %}

{% block content %}
<div class="container">
    <h2>{% trans "Crear Producto" %}</h2>
    <form method="post">
        {% csrf_token %}  <!-- Token CSRF para seguridad -->
        {{ form.as_p }}  <!-- Muestra el formulario -->
        <button type="submit" class="btn btn-success">{% trans "Guardar" %}</button>
    </form>
</div>
{% endblock %}
